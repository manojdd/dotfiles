# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=0
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
view_current_to_back=1
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us
xkb_rules_options=ctrl:nocaps

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# Layout
bind=SUPER,t,setlayout,tile
bind=SUPER,m,setlayout,monocle
bind=SUPER,s,setlayout,scroller
bind=SUPER,c,setlayout,center_tile

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
# bind=Alt,space,spawn,rofi -show drun
bind=Super,p,spawn,fuzzel
bind=SUPER+SHIFT,Return,spawn,foot

# exit
bind=SUPER+SHIFT,q,quit
bind=SUPER+SHIFT,c,killclient,

# spawn - dwl equivalents
bind=SUPER+SHIFT,KP_Up,spawn_shell,ddcutil detect | grep Display | awk '{print $2}' | xargs -I % ddcutil --display % setvcp 10 + 5
bind=SUPER+SHIFT,KP_Down,spawn_shell,ddcutil detect | grep Display | awk '{print $2}' | xargs -I % ddcutil --display % setvcp 10 - 5
bind=SUPER,a,spawn,ghostty --background-opacity=0.7 --maximize=true -e emacsclient -nw -e "(my/org-agenda-terminal)"
bind=NONE,F5,spawn_shell,bluetoothctl connect E8:7F:6B:1A:3E:88 || bluetoothctl connect 40:ED:98:19:8B:2F
# TODO: The scripts are not in system PATH, so need to be invoked through zsh. See if you can fix this by installing to /usr/local/bin/
bind=NONE,F6,spawn,zsh -c roam-daily-note-capture.sh
bind=NONE,F7,spawn,zsh -c "note-capture silent"
bind=SUPER+CTRL,q,spawn,swaylock -f -c 000000
bind=NONE,Pause,spawn,systemctl suspend
bind=Shift,Pause,spawn,stretchly reset
bind=SUPER+CTRL,Pause,spawn,stretchly toggle
bind=SUPER+CTRL,period,spawn_shell,wlr-randr --json | jq -e '.[] | select(.name == "HDMI-A-1") | .enabled' && wlr-randr --output "HDMI-A-1" --off || wlr-randr --output "HDMI-A-1" --on
bind=SUPER,b,spawn,killall -SIGUSR1 waybar
bind=NONE,Print,spawn_shell,grim -g "$(slurp)" - | wl-copy
bind=NONE,XF86AudioPlay,spawn,playerctl play
bind=NONE,XF86AudioPause,spawn,playerctl pause
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,F9,spawn,playerctl previous
bind=NONE,F10,spawn,playerctl play-pause
bind=NONE,F11,spawn,playerctl next
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-

# switch window focus
# bind=SUPER,Tab,focusstack,next
# bind=Alt,Tab,focuslast
bind=SUPER,Tab,view,0,0
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
# bind=SUPER,k,focusdir,up
# bind=SUPER,j,focusdir,down
bind=SUPER,k,focusstack,prev
bind=SUPER,j,focusstack,next

# master count
bind=SUPER,i,incnmaster,+1
bind=SUPER,d,incnmaster,-1

# swap window

bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,right
bind=SUPER,Return,zoom
# bind=SUPER,`,

# switch window status
bind=SUPER,g,togglegaps
bind=SUPER+SHIFT,0,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=SUPER+SHIFT,Left,tagtoleft,0
bind=SUPER+SHIFT,Right,tagtoright,0

bind=SUPER,0,view,0,0
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# tag toggle (from dwl TAGKEYS macro)
# Super+Ctrl+1-9: toggle view (show/hide tag)
bind=SUPER+CTRL,1,toggleview,1
bind=SUPER+CTRL,2,toggleview,2
bind=SUPER+CTRL,3,toggleview,3
bind=SUPER+CTRL,4,toggleview,4
bind=SUPER+CTRL,5,toggleview,5
bind=SUPER+CTRL,6,toggleview,6
bind=SUPER+CTRL,7,toggleview,7
bind=SUPER+CTRL,8,toggleview,8
bind=SUPER+CTRL,9,toggleview,9
# Super+Ctrl+Shift+1-9: move client + toggle tag visibility
bind=SUPER+CTRL+SHIFT,1,toggletag,1
bind=SUPER+CTRL+SHIFT,2,toggletag,2
bind=SUPER+CTRL+SHIFT,3,toggletag,3
bind=SUPER+CTRL+SHIFT,4,toggletag,4
bind=SUPER+CTRL+SHIFT,5,toggletag,5
bind=SUPER+CTRL+SHIFT,6,toggletag,6
bind=SUPER+CTRL+SHIFT,7,toggletag,7
bind=SUPER+CTRL+SHIFT,8,toggletag,8
bind=SUPER+CTRL+SHIFT,9,toggletag,9

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi


exec-once=swayidle -w timeout 300 'swaylock -f -c 000000' timeout 600 'wlr-randr --json | jq -r ".[].name" | xargs -I % -n 1 wlr-randr --output % --off' resume 'wlr-randr --json | jq -r ".[].name" | xargs -I % -n 1 wlr-randr --output % --on' before-sleep 'playerctl pause; swaylock -f -c 000000'
exec-once=waybar
exec-once=foot --server
exec-once=swaybg -i ~/Pictures/Wallpapers/4K/SpaceView.png
exec-once=firefox-developer-edition
exec-once=kdeconnectd
exec-once=stretchly
exec-once=footclient --app-id=foot-main tmux new -As desktop
exec-once=mako
# exec-once=XDG_RUNTIME_DIR=/run/user/$(id -u) WAYLAND_DISPLAY=wayland-0 emacsclient -nc
exec-once=emacsclient -nc
